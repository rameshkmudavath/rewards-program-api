# App settings
spring.application.name=rewards

# H2 Database Connection Settings
spring.datasource.url=jdbc:h2:mem:rewardsdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true
# Expose Web Interface for H2 Debugging Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Hibernate/JPA schema generation strategies
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Database execution timing behavior override
spring.sql.init.mode=always